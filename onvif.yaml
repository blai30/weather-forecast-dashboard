onvif:
  - name: WeatherDash
    dev: eth0
    ports:
      server: 8081
      rtsp: 8555
    highQuality:
      rtsp: /weather
      width: 1920
      height: 1080
      framerate: 5
      bitrate: 1024
      quality: 4
    lowQuality:
      rtsp: /weather
      width: 1280
      height: 720
      framerate: 5
      bitrate: 512
      quality: 1
    target:
      hostname: mediamtx
      ports:
        rtsp: 8554
